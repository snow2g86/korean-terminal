<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한텀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Title Bar -->
    <div class="titlebar" data-tauri-drag-region style="-webkit-app-region: drag;">
        <span class="title" id="termTitle">한텀</span>
        <div class="status" style="-webkit-app-region: no-drag;">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">준비</span>
        </div>
    </div>

    <!-- Hardware Bar -->
    <div class="hw-bar" id="hwBar">
        <div class="hw-item">
            <span class="hw-label">CPU</span>
            <span class="hw-spec" id="hwCpuSpec">--</span>
            <div class="hw-gauge">
                <div class="hw-gauge-fill" id="hwCpuBar"></div>
                <div class="hw-gauge-text" id="hwCpuText">--%</div>
            </div>
        </div>
        <div class="hw-item">
            <span class="hw-label">MEM</span>
            <span class="hw-spec" id="hwMemSpec">--</span>
            <div class="hw-gauge">
                <div class="hw-gauge-fill" id="hwMemBar"></div>
                <div class="hw-gauge-text" id="hwMemText">--%</div>
            </div>
        </div>
        <div class="hw-item">
            <span class="hw-label">DISK</span>
            <div class="hw-gauge">
                <div class="hw-gauge-fill" id="hwDiskBar"></div>
                <div class="hw-gauge-text" id="hwDiskText">--%</div>
            </div>
        </div>
        <div class="hw-item">
            <span class="hw-label">NET</span>
            <span class="hw-net-val" id="hwNetVal">-- --</span>
        </div>
        <div class="hw-item" style="margin-left:auto">
            <span class="hw-spec" id="hwOsInfo">--</span>
        </div>
    </div>

    <!-- Main Area -->
    <div class="main-area">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <button class="add-tab-btn" id="addTabBtn" title="새 터미널">+</button>
            <div class="sidebar-spacer"></div>
            <button class="settings-btn" id="favoritesBtn" title="즐겨찾기">
                <i data-lucide="star"></i>
            </button>
            <button class="settings-btn" id="settingsBtn" title="설정">
                <i data-lucide="settings"></i>
            </button>
        </div>

        <!-- Terminal Panel -->
        <div class="terminal-panel" id="terminalPanel"></div>

        <!-- Favorites Panel -->
        <div class="settings-panel" id="favoritesPanel" style="display:none;"></div>

        <!-- Settings Panel -->
        <div class="settings-panel" id="settingsPanel" style="display:none;"></div>
    </div>

    <link rel="stylesheet" href="vendor/xterm.css">
    <script src="vendor/xterm.js"></script>
    <script src="vendor/addon-fit.js"></script>
    <script src="vendor/addon-web-links.js"></script>
    <script src="vendor/lucide.min.js"></script>
    <style>
      .pane-terminal-area { flex: 1; overflow: hidden; background: #0d1117; padding: 2px; }
      .pane-terminal-area .xterm { height: 100%; }
    </style>
    <script>
      // 에러 로깅 — 모든 JS 에러를 DOM에 표시
      window._errorLog = [];
      function _showErrors() {
        var d = document.getElementById('_debugPanel');
        if (!d) {
          d = document.createElement('pre');
          d.id = '_debugPanel';
          d.style.cssText = 'position:fixed;top:40px;left:60px;right:10px;bottom:10px;z-index:9999;background:rgba(0,0,0,0.95);color:#ff6b6b;font-size:12px;padding:12px;overflow:auto;font-family:monospace;white-space:pre-wrap;display:none;border:2px solid #ff6b6b;border-radius:8px;';
          document.body.appendChild(d);
        }
        if (window._errorLog.length > 0) {
          d.style.display = 'block';
          d.textContent = '=== ERRORS (' + window._errorLog.length + ') ===\n\n' + window._errorLog.join('\n\n');
        }
      }
      window.onerror = function(msg, src, line, col, err) {
        var entry = '[ERROR] ' + msg + '\n  at ' + (src||'').split('/').pop() + ':' + line + ':' + col;
        window._errorLog.push(entry);
        _showErrors();
      };
      window.addEventListener('unhandledrejection', function(e) {
        var entry = '[PROMISE] ' + (e.reason && e.reason.message || e.reason || 'unknown');
        window._errorLog.push(entry);
        _showErrors();
      });
    </script>
    <script>
      // Tauri API 사용 가능 여부 확인
      if (!window.__TAURI__) {
        window._errorLog.push('[FATAL] window.__TAURI__ is undefined');
        _showErrors();
      }
    </script>
    <script src="tauri-bridge.js"></script>
    <script src="utils.js"></script>
    <script src="pane.js"></script>
    <script src="tabs.js"></script>
    <script src="split.js"></script>
    <script src="dir-autocomplete.js"></script>
    <script src="context-menu.js"></script>
    <script src="ime-indicator.js"></script>
    <script src="favorites.js"></script>
    <script src="md-sidebar.js"></script>
    <script src="settings.js"></script>
    <script src="layout-persist.js"></script>
    <script src="hw-monitor.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
